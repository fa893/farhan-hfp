<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة تحدي الأبطال الرقميين</title>
    <style>
        :root {
            /* الألوان مستوحاة مباشرة من صورة عنكود */
            --ankoud-blue: #5bc2e7; /* لون الدرع الداخلي */
            --ankoud-dark-blue: #1e3a8a; /* لون النص في الشعار */
            --ankoud-green: #22c55e; /* لون حدود الدرع الأخضر */
            --ankoud-white: #ffffff;
            --ankoud-accent-orange: #f59e0b; /* لون الصواعق في الصورة */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* خلفية متدرجة مريحة مستوحاة من ألوان الصورة */
            background: linear-gradient(135deg, #f0f9ff 0%, #bae6fd 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: var(--ankoud-dark-blue);
            overflow: hidden;
        }

        /* حاوية الأنميشن لشخصية عنكود */
        .character-box {
            position: relative;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .ankoud-avatar {
            width: 180px;
            height: 180px;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
            /* أنميشن الطفو الاحترافي */
            animation: floatAnkoud 4s ease-in-out infinite;
            z-index: 2;
        }

        /* تأثير الظل تحت الشخصية */
        .shadow {
            width: 100px;
            height: 15px;
            background: rgba(30, 58, 138, 0.1);
            border-radius: 50%;
            position: absolute;
            bottom: -15px;
            animation: shadowScale 4s ease-in-out infinite;
            filter: blur(8px);
        }

        @keyframes floatAnkoud {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        @keyframes shadowScale {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(0.8); opacity: 0.2; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.8);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            border: 2px solid var(--ankoud-blue);
            width: 90%;
            max-width: 420px;
            position: relative;
        }

        h1 { 
            margin-bottom: 30px; 
            font-size: 28px; 
            color: var(--ankoud-dark-blue);
            font-weight: 800;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            margin: 15px 0;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-game { 
            background: var(--ankoud-green);
            color: white; 
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.3);
        }

        .btn-data { 
            background: var(--ankoud-blue);
            color: white; 
            box-shadow: 0 6px 20px rgba(91, 194, 231, 0.3);
        }

        .btn:hover { 
            transform: translateY(-5px);
            filter: brightness(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* لمسة جمالية: صواعق صغيرة في الخلفية مستوحاة من الصورة */
        .decoration {
            position: absolute;
            color: var(--ankoud-accent-orange);
            font-size: 24px;
            opacity: 0.6;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- حاوية الشخصية والظل -->
    <div class="character-box">
        <!-- تأكد أن اسم الصورة هو عنكود.jpg أو عدله هنا -->
        <img src="عنكود.jpg" alt="شخصية عنكود" class="ankoud-avatar" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3048/3048122.png'">
        <div class="shadow"></div>
    </div>

    <h1>يهلي ويرحب بيكم عنكود</h1>
    
    <a href="hfp.html" class="btn btn-game">دخول اللعبة 🚀</a>
    
    <button onclick="checkAccess()" class="btn btn-data">لوحة البيانات والتحكم 📊</button>
</div>

<script>
    const users = {
        "Alryan Alhrezat": "Hfp5",
        "Bishre Mahasneh": "Hfp5",
        "Farhan Alkhawaldeh": "Hfp5",
        "Ishraq Ayasreh": "Hfp5",
        "Joud Tarawneh": "Hfp5",
        "Laith AlHawamdeh": "Hfp5",
        "Rawan Hraishat": "Hfp5",
        "Yehya Alkurdi": "Hfp5"
    };

    function checkAccess() {
        const username = prompt("الرجاء إدخال اسم المستخدم:");
        if (!username) return;

        if (users[username]) {
            const password = prompt("الرجاء إدخال كلمة المرور:");
            if (password === users[username]) {
                window.location.href = "hfpdata.html";
            } else {
                alert("كلمة المرور غير صحيحة!");
            }
        } else {
            alert("اسم المستخدم غير موجود!");
        }
    }
</script>

</body>
</html>
